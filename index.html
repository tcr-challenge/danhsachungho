<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Mạnh Thường Quân - Giải Chạy Thượng Cát 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #d32f2f; 
            --secondary-color: #1a237e; 
            --bg-color: #fdfaf5; 
            --text-color: #333;
            --border-color: #e0e0e0;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-color);
            background-image: url('https://www.transparenttextures.com/patterns/cloudy-day.png');
            color: var(--text-color);
        }

        .cover-photo {
            width: 100%;
            max-width: 1200px;
            height: auto;
            display: block;
            border-bottom: 5px solid var(--primary-color);
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: #fff; 
            padding: 30px;
            box-sizing: border-box;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            margin: 0;
            font-size: 26px;
            color: var(--secondary-color);
            text-transform: uppercase;
            font-weight: 800;
        }

        .summary-box {
            background: #fff9c4;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #fbc02d;
        }

        .total-amount-val {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .table-wrapper { 
            overflow-x: auto;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
        }

     th {
            background-color: var(--secondary-color);
            color: white;
            text-align: left;
            padding: 18px 15px;
            font-weight: 600;
            white-space: nowrap;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            color: var(--text-color);
            white-space: nowrap; /* Giữ địa chỉ không xuống dòng */
            font-family: 'Inter', sans-serif !important; /* Ép mọi ô dùng chung font */
        }

        /* Co hẹp cột STT */
        .col-stt { width: 50px; text-align: center; font-weight: 600; }
        
        /* Tên và Công ty có thể xuống dòng nếu quá dài để không đẩy bảng quá rộng */
        .col-name, .col-company { white-space: normal; min-width: 150px; font-weight: 500; }
        
        .col-amount { font-weight: 700; color: var(--primary-color); }
        .col-note {white-space: normal; }

        tr:hover { background-color: #f5f5f5; }

        .footer-info {
            width: 100%;
            max-width: 1200px;
            padding: 30px;
            background: #eee;
            text-align: center;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            th:nth-child(4), td:nth-child(4), 
            th:nth-child(5), td:nth-child(5) { display: none; }
        }
    </style>
</head>
<body>

<img src="images/banner.jpg" alt="Banner" class="cover-photo">

<div class="container">
    <div class="header">
        <h1>DANH SÁCH MẠNH THƯỜNG QUÂN ỦNG HỘ</h1>
    </div>

    <div class="summary-box">
        <div>Tổng số tiền: <span class="total-amount-val">0 VNĐ</span></div>
        <div style="font-size: 14px; margin-top: 5px;">(Bằng chữ: <span class="total-text-display">...</span>)</div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th class="col-stt">STT</th>
                    <th class="col-name">Họ và Tên</th>
                    <th class="col-company">Đơn vị/CLB</th>
                    <th>Địa chỉ</th>
                    <th>Điện thoại</th>
                    <th>Số tiền</th>
                    <th class="col-note">Ghi chú</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="7" style="text-align:center; padding: 40px;">Đang kết nối dữ liệu...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const tsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQpMfXvpG3RBMCNXm_m-iP9YjY_uZKLcxdnfRm86mo8hgPBGz5n3-xC3yuyjXrJM3rA1q0DNsYHJ2tx/pub?gid=648421086&single=true&output=tsv';

    function docSoTiengViet(so) {
        if (so == 0) return "Không đồng";
        const chuSo = ["không", "một", "hai", "ba", "bốn", "năm", "sáu", "bảy", "tám", "chín"];
        function doc3So(n, showZero, isFirstGroup) {
            let res = "";
            let tram = Math.floor(n / 100);
            let chuc = Math.floor((n % 100) / 10);
            let donVi = n % 10;
            if (tram > 0) res += chuSo[tram] + " trăm ";
            else if (showZero && !isFirstGroup) res += "không trăm ";
            if (chuc > 1) {
                res += chuSo[chuc] + " mươi ";
                if (donVi == 1) res += "mốt";
                else if (donVi == 5) res += "lăm";
                else if (donVi > 0) res += chuSo[donVi];
            } else if (chuc == 1) {
                res += "mười ";
                if (donVi == 5) res += "lăm";
                else if (donVi > 0) res += chuSo[donVi];
            } else if (donVi > 0) {
                if (tram > 0 || (showZero && !isFirstGroup)) res += "lẻ " + chuSo[donVi];
                else res += chuSo[donVi];
            }
            return res;
        }
        let units = ["", "nghìn", "triệu", "tỷ"];
        let res = "";
        let tempSo = so;
        let blocks = [];
        while (tempSo > 0) {
            blocks.push(tempSo % 1000);
            tempSo = Math.floor(tempSo / 1000);
        }
        for (let i = blocks.length - 1; i >= 0; i--) {
            let n = blocks[i];
            if (n > 0) {
                let isFirstGroup = (i === blocks.length - 1);
                res += doc3So(n, true, isFirstGroup) + " " + units[i] + " ";
            }
        }
        res = res.trim().replace(/\s+/g, ' ');
        return res.charAt(0).toUpperCase() + res.slice(1) + " đồng";
    }

    async function fetchData() {
        try {
            const response = await fetch(tsvUrl);
            const text = await response.text();
            const rows = text.split('\n').map(row => row.split('\t'));
            renderTable(rows);
        } catch (e) {
            console.error(e);
        }
    }

    function renderTable(rows) {
        const header = rows[0].map(h => h.toLowerCase().trim());
        const getIdx = (ks) => header.findIndex(h => ks.some(k => h.includes(k)));
        
        const idxName = getIdx(['họ và tên']);
        const idxTitle = getIdx(['danh xưng']);
        const idxCompany = getIdx(['công ty', 'clb']);
        const idxAddress = getIdx(['địa chỉ']);
        const idxPhone = getIdx(['số điện thoại']);
        const idxAmount = getIdx(['số tiền']);
        const idxNote = getIdx(['ghi chú']);

        let html = '';
        let total = 0;
        let count = 0;

        rows.slice(1).forEach(row => {
            if (!row[idxName] || row[idxName].trim() === "") return;
            count++;
            let name = row[idxName].trim();
            let title = (row[idxTitle] || '').trim();
            if (title.toLowerCase() === 'khác') title = '';
            
            let company = (row[idxCompany] || '---').trim();
            let address = (row[idxAddress] || '---').trim();
            let phone = (row[idxPhone] || '').trim();
            let amountRaw = (row[idxAmount] || '0').trim().replace(/[^0-9]/g, '');
            let amount = parseInt(amountRaw) || 0;
            let note = (row[idxNote] || '---').trim();

            total += amount;
            let displayPhone = (phone && phone.length > 4) ? `...${phone.slice(-4)}` : '---';

            html += `<tr>
                <td class="col-stt">${count}</td>
                <td class="col-name">${title} ${name}</td>
                <td class="col-company">${company}</td>
                <td>${address}</td>
                <td>${displayPhone}</td>
                <td class="col-amount">${amount > 0 ? amount.toLocaleString('vi-VN') + ' đ' : 'Quà tặng'}</td>
                <td class="col-note">${amount > 0 ? note : ''}</td>
            </tr>`;
        });

        document.getElementById('table-body').innerHTML = html;
        document.querySelector('.total-amount-val').innerText = total.toLocaleString('vi-VN') + ' VNĐ';
        document.querySelector('.total-text-display').innerText = docSoTiengViet(total);
    }

    fetchData();
</script>
</body>
</html>
