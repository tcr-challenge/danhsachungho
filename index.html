<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Mạnh Thường Quân - Giải Chạy Thượng Cát 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #d32f2f; 
            --secondary-color: #1a237e; 
            --bg-color: #fdfaf5; 
            --text-color: #333;
            --gold-bg: rgba(255, 193, 7, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cover-photo {
            width: 100%;
            max-width: 1200px;
            height: auto;
            border-bottom: 5px solid var(--primary-color);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: rgba(255, 255, 255, 0.98); 
            padding: 20px;
            box-sizing: border-box;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { 
            font-size: 22px; 
            color: var(--secondary-color); 
            text-transform: uppercase; 
            font-weight: 800;
            margin: 0;
        }

        .summary-box {
            background: var(--gold-bg);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #ffe082;
        }

        .total-amount-val {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary-color);
            display: block;
        }

        /* PC Table Styles */
        .table-wrapper { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: var(--secondary-color); color: white; padding: 12px; font-size: 13px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }

        .col-stt { width: 40px; text-align: center; }
        .col-amount { font-weight: 700; color: var(--primary-color); }
        .gift-cell { font-weight: 700; color: #2e7d32; }

        /* Responsive Mobile - Quan trọng nhất */
        @media (max-width: 768px) {
            .header h1 { font-size: 18px; }
            
            /* Biến bảng thành dạng danh sách cuộn dọc */
            table, thead, tbody, th, td, tr { display: block; }
            
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            
            tr {
                margin-bottom: 10px;
                border: 1px solid #ddd;
                border-radius: 8px;
                padding: 10px;
                background: #fff;
            }

            td {
                border: none;
                padding: 4px 0 4px 110px;
                position: relative;
                min-height: 24px;
                white-space: normal;
                text-align: right;
            }

            td:before {
                position: absolute;
                left: 10px;
                width: 100px;
                padding-right: 10px;
                white-space: nowrap;
                text-align: left;
                font-weight: bold;
                color: var(--secondary-color);
                content: attr(data-label);
                font-size: 12px;
            }

            /* Ẩn các cột không quan trọng trên điện thoại để đỡ rối */
            td[data-label="Địa chỉ"], 
            td[data-label="Số điện thoại"] { display: none; }

            /* Ưu tiên hiển thị Họ tên và Số tiền to rõ */
            td[data-label="Họ và Tên"] { font-size: 16px; color: var(--secondary-color); }
            td[data-label="Số tiền"] { font-size: 16px; }
        }

        .footer-info {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            box-sizing: border-box;
            background: #f1f1f1;
            font-size: 14px;
            line-height: 1.6;
        }
        .footer-info a { color: var(--primary-color); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<img src="images/banner.jpg" alt="Mạnh Thường Quân" class="cover-photo">

<div class="container">
    <div class="header">
        <h1>DANH SÁCH MẠNH THƯỜNG QUÂN<br>GIẢI CHẠY THƯỢNG CÁT 2026</h1>
    </div>

    <div class="summary-box">
        Tổng số tiền: <span class="total-amount-val">0 VNĐ</span>
        <div id="count" style="font-size: 13px; margin-top: 5px; color: #666;">Đang cập nhật...</div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Họ và Tên</th>
                    <th>Đơn vị</th>
                    <th>Địa chỉ</th>
                    <th>Số điện thoại</th>
                    <th>Số tiền</th>
                    <th>Ghi chú</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>
</div>

<div class="footer-info">
    <strong>LIÊN HỆ BTC:</strong><br>
    Ông Nguyễn Anh Tuấn: 0968 814 606<br>
    Zalo: <a href="https://vnshort.com/vy6J">vnshort.com/vy6J</a>
</div>

<script>
    const tsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQpMfXvpG3RBMCNXm_m-iP9YjY_uZKLcxdnfRm86mo8hgPBGz5n3-xC3yuyjXrJM3rA1q0DNsYHJ2tx/pub?gid=648421086&single=true&output=tsv';

    async function fetchData() {
        try {
            const response = await fetch(tsvUrl);
            const text = await response.text();
            const rows = text.split('\n').map(row => row.split('\t'));
            renderTable(rows);
        } catch (e) {
            console.error(e);
        }
    }

    function renderTable(rows) {
        const header = rows[0].map(h => h.toLowerCase().trim());
        const getIdx = (ks) => header.findIndex(h => ks.some(k => h.includes(k)));
        
        const idxTitle = getIdx(['danh xưng']);
        const idxName = getIdx(['họ và tên']);
        const idxCompany = getIdx(['công ty', 'clb']);
        const idxAddress = getIdx(['địa chỉ']);
        const idxPhone = getIdx(['số điện thoại']);
        const idxAmount = getIdx(['số tiền']);
        const idxNote = getIdx(['ghi chú']);

        let html = '';
        let total = 0;
        let count = 0;

        rows.slice(1).forEach(row => {
            if (!row[idxName] || row[idxName].trim() === "") return;
            count++;
            let name = row[idxName].trim();
            let title = (row[idxTitle] || '').trim();
            if (title.toLowerCase() === 'khác') title = '';
            
            let company = (row[idxCompany] || '---').trim();
            let address = (row[idxAddress] || '---').trim();
            let phone = (row[idxPhone] || '').trim();
            let amountRaw = (row[idxAmount] || '0').trim().replace(/[^0-9]/g, '');
            let amount = parseInt(amountRaw) || 0;
            let note = (row[idxNote] || '---').trim();

            total += amount;
            let displayPhone = (phone.length > 4) ? `...${phone.slice(-4)}` : '---';

            html += `<tr>
                <td data-label="STT" class="col-stt">${count}</td>
                <td data-label="Họ và Tên"><strong>${title} ${name}</strong></td>
                <td data-label="Đơn vị">${company}</td>
                <td data-label="Địa chỉ">${address}</td>
                <td data-label="Số điện thoại">${displayPhone}</td>
                <td data-label="Số tiền" class="col-amount">${amount > 0 ? amount.toLocaleString('vi-VN') + ' đ' : '<span class="gift-cell">QUÀ TẶNG</span>'}</td>
                <td data-label="Ghi chú">${amount > 0 ? note : ''}</td>
            </tr>`;
        });

        document.getElementById('table-body').innerHTML = html;
        document.querySelector('.total-amount-val').innerText = total.toLocaleString('vi-VN') + ' VNĐ';
        document.getElementById('count').innerText = `Tổng cộng: ${count} lượt ủng hộ`;
    }

    fetchData();
    setInterval(fetchData, 60000);
</script>
</body>
</html>
